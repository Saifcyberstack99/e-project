<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | VogueMan</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-container h2 {
            margin-bottom: 10px;
            letter-spacing: 2px;
            color: #333;
        }
        .login-container p {
            color: #777;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            outline: none;
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #002147; /* VogueMan Navy Blue */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        .login-btn:hover {
            background-color: #001530;
        }
        .footer-links {
            margin-top: 25px;
            font-size: 13px;
        }
        .footer-links a {
            color: #002147;
            text-decoration: none;
            font-weight: bold;
        }
        .back-home {
            margin-top: 20px;
            display: inline-block;
            font-size: 12px;
            color: #999;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>VOGUEMAN</h2>
    <p>Enter your credentials to access your account</p>
    
    <form>
        <div class="input-group">
            <input type="email" placeholder="Email Address" required>
        </div>
        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn">SIGN IN</button>
    </form>

    <div class="footer-links">
        <a href="#">Forgot Password?</a> <br><br>
        Don't have an account? <a href="#">Create One</a>
    </div>
    
    <a href="index.html" class="back-home">← Back to Store</a>
</div>

</body>
</html>
